name: python-app1-cicd

on:
  push:
   paths:
     - src/**
   branches:
     - main

jobs:
  ci:    
    runs-on: ubuntu-latest
    steps:
      - name: Set short SHA
        run: echo "COMMIT_ID=${GITHUB_SHA::6}" >> $GITHUB_ENV    

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Sophos certificate file
        run: |
          cat <<EOF > sophos_ca.crt
          ${{ secrets.SOPHOS_CA_CRT }}
          EOF

      - name: Verify cert exists
        run: ls -l sophos_ca.crt

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      # -
      #   name: Build and push
      #   uses: docker/build-push-action@v7
      #   with:
      #     push: true
      #     tags: zahraehghaghi/python-app:

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: zahraehghaghi/python-app1:${{ env.COMMIT_ID }}     
    outputs: 
      commit_id: ${{ env.COMMIT_ID }}
  cd:    
    runs-on: ubuntu-latest
    needs: ci
    steps:    
      
      - uses: actions/checkout@v3

      - name: Modify values file 
        shell: bash
        run: |       
          echo ${{ needs.ci.outputs.commit_id }}
          pip install yq
          yq -Yi '.image.tag= "${{ needs.ci.outputs.commit_id }}"' charts/python-app1/values-prod.yaml
    
      - name: Commit change
        uses: EndBug/add-and-commit@v9
        with: 
          message: 'Update values.yaml with ${{ needs.ci.outputs.commit_id }}'

      